name: Trigger BtoB Frontend Notifier

on:
  schedule:
    # 毎週金曜日 11:00 JST (= 02:00 UTC)
    - cron: "0 2 * * 5"
  workflow_dispatch:
    inputs:
      target_week:
        description: |
          対象週のオフセット（0=直前の木曜日〜次の木曜日, -1=その前の週, デフォルト: 0）
        required: false
        default: "0"

# デフォルトシェルでパイプエラーを有効化
defaults:
  run:
    shell: bash

# 全パーミッションの無効化
permissions: {}

# 複数回同時に実行された場合に、前回のActionをキャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Dispatch to backlog-slack-notifier
        env:
          REPO_DISPATCH_TOKEN: ${{ secrets.BACKLOG_NOTIFIER_PAT }}
          TARGET_WEEK: ${{ github.event_name == 'schedule' && '-1' || github.event.inputs.target_week || '0' }}
        run: |
          curl -s -f \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tatsuyaH20/backlog-slack-notifier-/dispatches \
            -d "{\"event_type\":\"trigger-btob-frontend\",\"client_payload\":{\"target_week\":\"${TARGET_WEEK}\"}}"
