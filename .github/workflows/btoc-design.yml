name: Trigger BtoC Design Notifier

on:
  schedule:
    # 毎週火曜日 09:00 JST (= 火曜日 00:00 UTC)
    - cron: "0 0 * * 2"
  workflow_dispatch:
    inputs:
      dry_run:
        description: |
          ドライラン（true=Slack送信をスキップしてペイロードのみ表示）
        required: false
        default: "true"

# デフォルトシェルでパイプエラーを有効化
defaults:
  run:
    shell: bash

# 全パーミッションの無効化
permissions: {}

# 複数回同時に実行された場合に、前回のActionをキャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Dispatch to backlog-slack-notifier
        env:
          REPO_DISPATCH_TOKEN: ${{ secrets.BACKLOG_NOTIFIER_PAT }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || github.event.inputs.dry_run || 'true' }}
        run: |
          curl -s -f \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tatsuyaH20/backlog-slack-notifier/dispatches \
            -d "{\"event_type\":\"trigger-btoc-design\",\"client_payload\":{\"dry_run\":\"${DRY_RUN}\"}}"
